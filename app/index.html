<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 Rocket Mission</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
    
    body {
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(135deg, #0a0a1f, #1a0033);
      color: #00ffcc;
      margin: 0;
      padding: 15px;
      min-height: 100vh;
    }
    .container {
      max-width: 650px;
      margin: 0 auto;
      background: rgba(0,0,0,0.7);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 0 30px rgba(0, 255, 200, 0.3);
    }
    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 30px;
      text-shadow: 0 0 15px #00ffcc;
    }
    input {
      width: 100%;
      padding: 18px;
      margin: 12px 0;
      background: #1a0033;
      border: 2px solid #00ffcc;
      border-radius: 12px;
      color: white;
      font-size: 18px;
    }
    button {
      width: 100%;
      padding: 20px;
      background: linear-gradient(90deg, #ff6600, #ffaa00);
      color: black;
      font-size: 22px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      margin: 25px 0;
      box-shadow: 0 0 20px #ff6600;
    }
    .result {
      background: rgba(0, 255, 100, 0.1);
      border: 2px solid #00ff88;
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
      font-size: 17px;
      line-height: 1.8;
    }
    canvas {
      width: 100%;
      height: 280px;
      background: #000;
      border-radius: 15px;
      margin-top: 20px;
      border: 2px solid #00ffcc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 ROCKET TRAJECTORY</h1>
    
    <input type="number" id="fuel" placeholder="Fuel Amount (kg)" />
    <input type="number" id="distance" placeholder="Target Distance (km)" />
    
    <button onclick="calculate()">LAUNCH CALCULATION</button>
    
    <div id="result" class="result"></div>
    <canvas id="graph"></canvas>
  </div>

  <script>
    function calculate() {
      const fuel = parseFloat(document.getElementById('fuel').value);
      const distance = parseFloat(document.getElementById('distance').value);
      const resultDiv = document.getElementById('result');
      
      if (!fuel || !distance) {
        resultDiv.innerHTML = "❌ Enter valid values for fuel and distance";
        return;
      }

      const deltaV = 3000 * Math.log(fuel / 700 + 1);
      const time = (distance * 1000) / (deltaV * 0.6);
      const maxAlt = (deltaV ** 2) / (2 * 9.81) / 1000;

      let status = deltaV > 5500 ? "✅ HIGH SUCCESS" : deltaV > 3500 ? "⚠️ MEDIUM" : "❌ LOW";

      let output = `MISSION REPORT\n\n`;
      output += `Fuel: ${fuel} kg\n`;
      output += `Delta-V: ${deltaV.toFixed(0)} m/s\n`;
      output += `Flight Time: ${time.toFixed(1)} s\n`;
      output += `Max Altitude: ${maxAlt.toFixed(1)} km\n`;
      output += `Status: ${status}`;

      resultDiv.innerHTML = output.replace(/\n/g, '<br>');

      drawTrajectory(distance, maxAlt * 1000);
    }

    function drawTrajectory(dist, alt) {
      const canvas = document.getElementById('graph');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      ctx.strokeStyle = '#00ffcc';
      ctx.lineWidth = 5;
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#00ffcc';
      
      ctx.beginPath();
      const steps = 40;
      for (let i = 0; i <= steps; i++) {
        const progress = i / steps;
        const x = progress * canvas.width;
        const y = canvas.height * 0.8 - Math.sin(Math.PI * progress) * (alt / 15000) * canvas.height * 0.7;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  </script>
</body>
</html>
